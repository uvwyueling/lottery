name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 PyInstaller
        run: pip install pyinstaller

      - name: 打包成 EXE
        run: pyinstaller --onefile --windowed --name lottery_picker src/lottery.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: lottery_picker_windows
          path: dist/lottery_picker.exe